<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Policy Intelligence Assistant</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="assets/css/auth.css" rel="stylesheet">
</head>
<body>

    <div class="auth-card">
        <h3 class="auth-title">Policy Intelligence Assistant</h3>
        
        <div id="login-error" class="alert alert-danger d-none" role="alert"></div>

        <form id="login-form">
            <div class="mb-3">
                <label for="login-email" class="form-label">Email address</label>
                <input type="email" class="form-control" id="login-email" required>
            </div>
            <div class="mb-3">
                <label for="login-password" class="form-label">Password</label>
                <input type="password" class="form-control" id="login-password" required>
            </div>
            <button type="submit" id="login-submit" class="btn btn-primary w-100 mb-3">Login</button>
        </form>

        <div class="text-center">
            <a href="register.html" class="text-decoration-none">Don't have an account? Register</a>
        </div>
    </div>

    <!-- Scripts -->
    <script type="module" src="assets/js/auth.js"></script>
</body>
</html>
