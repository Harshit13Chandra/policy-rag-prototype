<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Policy RAG Chat</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/chat.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>
    <div id="app-shell" class="d-flex vh-100">
        <!-- Sidebar (Offcanvas on mobile, fixed width on desktop) -->
        <div id="sidebar" class="offcanvas-md offcanvas-start bg-light border-end d-flex flex-column" tabindex="-1"
            style="width: 280px; max-width: 100%;">
            <div class="offcanvas-header d-md-none border-bottom">
                <h5 class="offcanvas-title">Menu</h5>
                <button type="button" class="btn-close" data-bs-dismiss="offcanvas" data-bs-target="#sidebar"
                    aria-label="Close"></button>
            </div>

            <div class="sidebar-header p-3 border-bottom d-flex justify-content-between align-items-center">
                <h5 class="m-0">Policy RAG</h5>
                <button id="new-chat-btn" class="btn btn-sm btn-primary">+ New Chat</button>
            </div>

            <div class="sidebar-search p-2 border-bottom">
                <input id="chat-search" type="text" placeholder="Search chats..." class="form-control">
            </div>

            <ul id="conversation-list" class="list-unstyled flex-grow-1 overflow-auto p-0 m-0"></ul>

            <div class="sidebar-footer p-3 border-top d-flex justify-content-between align-items-center">
                <span id="user-email-display" class="text-truncate me-2 small fw-bold"></span>
                <button id="logout-btn" class="btn btn-sm btn-outline-danger">Logout</button>
            </div>
        </div>

        <!-- Main Chat Area -->
        <div id="main-chat-area" class="flex-grow-1 d-flex flex-column bg-white position-relative">
            <!-- Mobile Topbar -->
            <div id="mobile-topbar" class="d-md-none p-2 border-bottom d-flex align-items-center bg-light">
                <button id="sidebar-toggle-btn" class="btn btn-light me-2 border" data-bs-toggle="offcanvas"
                    data-bs-target="#sidebar">☰</button>
                <span id="current-title-mobile" class="fw-bold text-truncate"></span>
            </div>

            <!-- Desktop Chat Header -->
            <div id="chat-header" class="d-none d-md-flex p-3 border-bottom align-items-center bg-light">
                <span id="current-conversation-title" class="fw-bold fs-5" contenteditable="false"></span>
            </div>

            <!-- Messages Container -->
            <div id="messages-container" class="flex-grow-1 overflow-auto p-3 p-md-4">
                <!-- Messages will be injected here via JS -->
            </div>

            <!-- Chat Input Bar -->
            <div id="chat-input-bar" class="p-3 border-top bg-light">
                <div class="input-group" style="max-width: 768px; margin: 0 auto;">
                    <textarea id="message-input" class="form-control"
                        placeholder="Ask a question about the policy documents..." rows="1"
                        style="resize: none;"></textarea>
                    <button id="send-btn" class="btn btn-primary px-4">Send</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toast-container" class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index: 1100;"></div>

    <!-- Delete Confirmation Modal -->
    <div id="delete-confirm-modal" class="modal fade" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Delete Chat</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <p>Are you sure you want to delete this chat? This action cannot be undone.</p>
                </div>
                <div class="modal-footer">
                    <button id="cancel-delete-btn" type="button" class="btn btn-secondary"
                        data-bs-dismiss="modal">Cancel</button>
                    <button id="confirm-delete-btn" type="button" class="btn btn-danger">Delete</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- ES Module Scripts -->
    <script type="module" src="assets/js/api.js"></script>
    <script type="module" src="assets/js/sidebar.js"></script>
    <script type="module" src="assets/js/stream.js"></script>
    <script type="module" src="assets/js/chat.js"></script>
</body>

</html>
