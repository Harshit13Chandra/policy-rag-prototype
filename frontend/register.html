<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Policy Intelligence Assistant</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="assets/css/auth.css" rel="stylesheet">
</head>
<body>

    <div class="auth-card">
        <h3 class="auth-title">Policy Intelligence Assistant</h3>
        
        <div id="register-error" class="alert alert-danger d-none" role="alert"></div>

        <form id="register-form">
            <div class="mb-3">
                <label for="register-fullname" class="form-label">Full Name (Optional)</label>
                <input type="text" class="form-control" id="register-fullname">
            </div>
            <div class="mb-3">
                <label for="register-email" class="form-label">Email address</label>
                <input type="email" class="form-control" id="register-email" required>
            </div>
            <div class="mb-3">
                <label for="register-password" class="form-label">Password</label>
                <input type="password" class="form-control" id="register-password" required minlength="10">
            </div>
            <div class="mb-3">
                <label for="register-confirm-password" class="form-label">Confirm Password</label>
                <input type="password" class="form-control" id="register-confirm-password" required minlength="10">
            </div>
            <button type="submit" id="register-submit" class="btn btn-primary w-100 mb-3">Register</button>
        </form>

        <div class="text-center">
            <a href="login.html" class="text-decoration-none">Already have an account? Login</a>
        </div>
    </div>

    <!-- Scripts -->
    <script type="module" src="assets/js/auth.js"></script>
</body>
</html>
